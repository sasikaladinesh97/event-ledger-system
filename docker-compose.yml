services:
  account-service:
    build:
      context: ./account-service
      dockerfile: Dockerfile
    container_name: account-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=default
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/accounts/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  event-gateway:
    build:
      context: ./event-gateway
      dockerfile: Dockerfile
    container_name: event-gateway
    ports:
      - "8080:8080"
    depends_on:
      account-service:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=default
